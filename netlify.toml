# Monorepo web deploy: connect the Netlify site to this repo root (no base-directory override).
# Use the global Netlify CLI from repo root: `pnpm netlify:link`, `pnpm netlify:deploy`, etc.
# Deploy from root uses `pnpm netlify:deploy*` (includes `--filter @widados/web` so the CLI monorepo picker does not block).
# See wiki/operations.md → Netlify.

[build]
  command = "pnpm install --frozen-lockfile && pnpm --filter @widados/web build"
  publish = "apps/web/dist"

[build.environment]
  NODE_VERSION = "20"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Strict-Transport-Security = "max-age=63072000; includeSubDomains; preload"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self' https://*.supabase.co; font-src 'self' data:; object-src 'none'; base-uri 'self'; frame-ancestors 'none';"
