# Monorepo web deploy: connect the Netlify site to this repo root (no base-directory override).
# Use the global Netlify CLI from repo root: `pnpm netlify:link`, `pnpm netlify:deploy`, etc.
# See wiki/operations.md → Netlify.

[build]
  command = "pnpm install --frozen-lockfile && pnpm --filter @widados/web build"
  publish = "apps/web/dist"

[build.environment]
  NODE_VERSION = "20"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
