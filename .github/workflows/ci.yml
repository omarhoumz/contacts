name: CI

on:
  push:
    branches: ["main", "cursor/**"]
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: "pnpm"
      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile
      - name: Lint
        run: pnpm lint
      - name: Typecheck
        run: pnpm typecheck
      - name: Build
        run: pnpm build
      - name: Storybook static build present
        run: test -f apps/ui-lib-docs/storybook-static/index.html
      - name: Supabase migration check
        run: |
          test -f apps/backend/supabase/migrations/20260421_initial_schema.sql
          test -f apps/backend/supabase/migrations/20260422_rls_contact_children_hardening.sql
