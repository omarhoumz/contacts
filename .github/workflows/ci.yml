name: CI

on:
  push:
    branches: ["main", "cursor/**"]
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: "pnpm"
      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile
      - name: Lint
        run: pnpm lint
      - name: Typecheck
        run: pnpm typecheck
      - name: Test
        run: pnpm test
      - name: Build
        run: pnpm build
      - name: Storybook static build present
        run: test -f apps/ui-lib-docs/storybook-static/index.html
      - name: Supabase migration check
        run: |
          test -d apps/backend/supabase/migrations
          test "$(ls -1 apps/backend/supabase/migrations/*.sql 2>/dev/null | wc -l)" -gt 0
